# ============================================================
# KONFIGURACJA TRENINGU: Embedded vs Not-Embedded
# Uruchamiaj przez: .venv\Scripts\python tools\run_comparison.py
# run_comparison.py nadpisuje data.root_dir i data.metadata_file
# automatycznie dla obu przebiegow (embedded / not_embedded).
# ============================================================

data:
  # Sciezki relatywne:
  #   metadata_file -> wzgledem src/
  #   root_dir      -> wzgledem katalogu projektu
  # Embedded:     root_dir: "data/embedded"     | metadata_file: "data_loader/metadata_embedded.xlsx"
  # Not-embedded: root_dir: "data/not_embedded" | metadata_file: "data_loader/metadata_not_embedded.xlsx"
  metadata_file: "data_loader/metadata_embedded.xlsx"
  root_dir: "data/embedded"
  train: "train"
  val: "val"
  test: "test"
  batch_size: 32
  num_workers: 4              # 0 = single-threaded (wolne dla dużych obrazów embedded)
  active_populations: [1, 2]
!!
# ============================================================
# MODEL MULTITASKINGOWY (aktywny gdy use: true)
# Backbone -> classifier_head (populacja) + regression_head (wiek)
# ============================================================
multitask_model:
  use: true
  backbone_model:
    model_name: "swin_v2_b"    # resnet50: 224 | swin_v2_b: 256 | convnext_large/regnet: 384 | efficientnet_v2_l: 480
    image_size: 256            # resnet50: 224 | swin_v2_b: 256 | convnext_large/regnet: 384 | efficientnet: 480
    pretrained: true
    freeze_encoder: false
    dropout_rate: 0.5
    weight_decay: 0.01
  classifier_head:
    type: "linear"
    dropout_rate: 0.5
  regression_head:
    type: "mlp"
    hidden_dim: 128
    dropout_rate: 0.3
  loss_weighting:
    method: "uncertainty"      # "none" | "static" | "uncertainty" | "gradnorm"
    static:
      classification: 1.0
      age: 0.3
  log_loss_components: true

# ============================================================
# MODEL KLASYFIKACYJNY (aktywny gdy multitask_model.use: false)
# ============================================================
base_model:
  base_model: "resnet50"
  image_size: 224
  pretrained: true
  freeze_encoder: false
  dropout_rate: 0.5
  weight_decay: 0.01

# ============================================================
# AUGMENTACJA DANYCH TRENINGOWYCH
# ============================================================
augmentation:
  mode: "strong"
  rotation: 30
  crop_scale: [0.8, 1.0]
  hflip_prob: 0.5
  vflip_prob: 0.5
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  affine_degrees: 15
  affine_translate: [0.1, 0.1]
  affine_scale: [0.9, 1.1]
  affine_shear: 10
  gaussian_blur_kernel: 3

# ============================================================
# PARAMETRY TRENINGU
# ============================================================
training:
  loss_type:
    - ldam
    # Dostepne: ldam | standard_ce | focal_loss_ageboost | class_balanced_focal
    #           focal_tversky | ghm | seesaw | asymmetric_focal
    #           sample_weighted_ce | weighted_age_ce
  stop_after_one_epoch: true   # true = test pipeline (1 epoka) | false = pelny trening
  epochs: 150
  learning_rate: 0.00001
  device: "auto"
  early_stopping_patience: 5
  early_stopping_metric:
    mode: "combined"       # "accuracy" | "combined"
    accuracy_weight: 0.5   # waga dla (1 - val_acc/100), tylko przy mode="combined"
    mae_weight: 0.5        # waga dla (val_mae / mae_reference), tylko przy mode="combined"
    mae_reference: 3.0     # punkt odniesienia MAE [lata] — MAE modelu bez uczenia
  checkpoint_dir: "checkpoints"

# ============================================================
# PREDYKCJA I WIZUALIZACJA STANDALONE
# Nie uzywane podczas treningu. Uzywane przez src/predict.py, src/visualize.py.
# Zaktualizuj model_path po treningu.
# ============================================================
prediction:
  model_path: "checkpoints/resnet50_ldam_multi/resnet50_ldam_ACC_XX.pth"
  image_path: "data/embedded/test/1/example.jpg"
  results_dir: "results/gradcam"
  show_visualization: true
  save_results: true

prediction_modes:
  navigation:
    image_dir: "data/embedded/test"

visualization:
  methods: ['gradcam', 'gradcam++', 'guided_backprop']
  display_mode: 'matrix'
  matrix_cols: 3
  save_individual: False
  target_layer: "base.layer4.2.conv3"   # resnet50: "base.layer4.2.conv3" | efficientnet: "base.features.8.0"
  colormap: "jet"
  alpha: 0.5